<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Портал в будущее</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui; }
        body { background: radial-gradient(circle at 10% 20%, #0A0F2A, #030617); color: #EFF3FF; }
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .glass-card { background: rgba(18, 25, 55, 0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 2rem; max-width: 500px; width: 100%; border: 1px solid rgba(90,150,255,0.3); }
        .auth-logo { font-size: 1.8rem; font-weight: 700; margin-bottom: 2rem; display: flex; gap: 10px; }
        .auth-logo span:first-child { background: #3B82F6; padding: 6px 18px; border-radius: 60px; }
        .tabs { display: flex; gap: 24px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 28px; }
        .tab-btn { background: none; border: none; font-size: 1.2rem; font-weight: 600; color: #B9C7FF; padding: 8px 0; cursor: pointer; }
        .tab-btn.active { color: #3B82F6; border-bottom: 2px solid #3B82F6; }
        .form { display: none; flex-direction: column; gap: 18px; }
        .form.active-form { display: flex; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group input { background: rgba(0,0,0,0.4); border: 1px solid #2D3A6E; border-radius: 28px; padding: 12px 18px; color: white; }
        button { background: #3B82F6; border: none; border-radius: 40px; padding: 12px; font-weight: 600; color: white; cursor: pointer; }
        .message { margin-top: 8px; padding: 10px; border-radius: 28px; text-align: center; font-size: 0.8rem; }
        .dash-header { background: rgba(8,12,30,0.85); padding: 12px 32px; display: flex; justify-content: space-between; }
        .logo { font-size: 1.4rem; font-weight: 700; display: flex; gap: 8px; }
        .logo span:first-child { background: #3B82F6; padding: 4px 14px; border-radius: 50px; }
        .logout-glass { background: rgba(255,255,255,0.08); padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .main-grid { max-width: 1400px; margin: 32px auto; padding: 0 24px; display: flex; gap: 28px; flex-wrap: wrap; }
        .sidebar-new { flex: 0 0 260px; background: rgba(15,22,48,0.7); border-radius: 36px; padding: 20px 12px; }
        .sidebar-item { padding: 12px 18px; margin: 6px 0; border-radius: 28px; cursor: pointer; }
        .sidebar-item:hover { background: #1E2A5C; }
        .sidebar-item.active { background: #3B82F6; }
        .content-new { flex: 1; background: rgba(10,16,38,0.6); border-radius: 36px; padding: 28px 32px; }
        .section-card { background: rgba(0,0,0,0.3); border-radius: 28px; padding: 20px; margin-bottom: 24px; }
        .info-grid-new { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 20px; margin: 28px 0; }
        .service-block-new { display: flex; gap: 20px; flex-wrap: wrap; margin: 30px 0; }
        .service-tile { background: #111B44; border-radius: 28px; padding: 20px; flex: 1; cursor: pointer; }
        .hidden-section { display: none; }
        .doc-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #28315A; }
        .btn-sm { background: #2563EB; padding: 6px 16px; border-radius: 30px; font-size: 0.75rem; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // ===== НАСТРОЙКИ (ПРОВЕРЬ ИХ!) =====
    const GITHUB_TOKEN = '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';
    const REPO_OWNER = 'sergeyRU38';
    const REPO_NAME = 'AIS-Portal-v-budushcee';  // ← УБЕДИСЬ, ЧТО ЭТО ПРАВИЛЬНОЕ ИМЯ!
    const DB_FILE = 'database.json';

    let currentUser = null;

    function toBase64(str) {
        const bytes = new TextEncoder().encode(str);
        let binString = '';
        bytes.forEach(byte => binString += String.fromCodePoint(byte));
        return btoa(binString);
    }

    function fromBase64(base64) {
        const binString = atob(base64);
        const bytes = new Uint8Array(binString.length);
        for (let i = 0; i < binString.length; i++) bytes[i] = binString.charCodeAt(i);
        return new TextDecoder().decode(bytes);
    }

    async function loadDatabase() {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DB_FILE}`;
        console.log('Загрузка с:', url);
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
            console.log('Статус ответа:', res.status);
            if (res.status === 404) {
                console.log('Файл не найден, создаём пустую базу');
                return { users: [] };
            }
            if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
            const data = await res.json();
            const content = fromBase64(data.content);
            return JSON.parse(content);
        } catch(e) {
            console.error('Ошибка загрузки:', e);
            alert('Ошибка соединения с GitHub: ' + e.message + '\nПроверь имя репозитория и токен.');
            return { users: [] };
        }
    }

    async function saveDatabase(db) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DB_FILE}`;
        const content = toBase64(JSON.stringify(db, null, 2));
        let sha = null;
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
            if (res.ok) {
                const data = await res.json();
                sha = data.sha;
            }
        } catch(e) {}
        const body = { message: 'Update database', content, branch: 'main' };
        if (sha) body.sha = sha;
        const response = await fetch(url, { 
            method: 'PUT', 
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' }, 
            body: JSON.stringify(body) 
        });
        if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
        return await response.json();
    }

    async function registerUser(email, password, fullName) {
        const db = await loadDatabase();
        if (db.users.find(u => u.email === email)) throw new Error('Пользователь уже существует');
        db.users.push({ id: Date.now(), email, password, fullName, documents: [] });
        await saveDatabase(db);
        return true;
    }

    async function loginUser(email, password) {
        const db = await loadDatabase();
        const user = db.users.find(u => u.email === email && u.password === password);
        if (!user) throw new Error('Неверный email или пароль');
        currentUser = user;
        sessionStorage.setItem('portal_user', JSON.stringify(currentUser));
        return true;
    }

    async function updateUserDocs(userId, newDocs) {
        const db = await loadDatabase();
        const idx = db.users.findIndex(u => u.id === userId);
        if (idx !== -1) db.users[idx].documents = newDocs;
        await saveDatabase(db);
        if (currentUser?.id === userId) {
            currentUser.documents = newDocs;
            sessionStorage.setItem('portal_user', JSON.stringify(currentUser));
        }
    }

    async function deleteAccount(userId) {
        const db = await loadDatabase();
        db.users = db.users.filter(u => u.id !== userId);
        await saveDatabase(db);
        currentUser = null;
        sessionStorage.removeItem('portal_user');
    }

    async function changePassword(userId, oldPwd, newPwd) {
        const db = await loadDatabase();
        const user = db.users.find(u => u.id === userId);
        if (!user || user.password !== oldPwd) throw new Error('Старый пароль неверен');
        user.password = newPwd;
        await saveDatabase(db);
        if (currentUser?.id === userId) {
            currentUser.password = newPwd;
            sessionStorage.setItem('portal_user', JSON.stringify(currentUser));
        }
    }

    async function uploadDocument(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const docs = currentUser.documents || [];
                docs.push({ id: Date.now(), name: file.name, type: file.type, data: e.target.result });
                await updateUserDocs(currentUser.id, docs);
                resolve();
            };
            reader.readAsDataURL(file);
        });
    }

    async function deleteDocument(docId) {
        const docs = currentUser.documents.filter(d => d.id !== docId);
        await updateUserDocs(currentUser.id, docs);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.cssText = 'position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#3B82F6; color:white; padding:10px 24px; border-radius:40px; z-index:9999';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ========== UI ==========
    function renderAuth() {
        document.getElementById('root').innerHTML = `
            <div class="auth-wrapper">
                <div class="glass-card">
                    <div class="auth-logo"><span>АИС</span><span>Портал в будущее</span></div>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="login">Вход</button>
                        <button class="tab-btn" data-tab="register">Регистрация</button>
                    </div>
                    <div id="loginForm" class="form active-form">
                        <div class="input-group"><label>Email</label><input id="loginEmail" placeholder="teacher@school.ru"></div>
                        <div class="input-group"><label>Пароль</label><input id="loginPass" type="password"></div>
                        <button id="doLoginBtn">Войти</button>
                        <div id="loginMsg" class="message"></div>
                    </div>
                    <div id="registerForm" class="form">
                        <div class="input-group"><label>Полное имя</label><input id="regName" placeholder="Иванова Анна Петровна"></div>
                        <div class="input-group"><label>Email</label><input id="regEmail" placeholder="teacher@portal.ru"></div>
                        <div class="input-group"><label>Пароль (≥6)</label><input id="regPass" type="password"></div>
                        <button id="doRegisterBtn">Зарегистрироваться</button>
                        <div id="regMsg" class="message"></div>
                    </div>
                </div>
            </div>
        `;
        const switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('loginForm').classList.toggle('active-form', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active-form', tab === 'register');
        };
        document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => switchTab(btn.dataset.tab));
        
        document.getElementById('doLoginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPass').value.trim();
            const msgDiv = document.getElementById('loginMsg');
            try {
                await loginUser(email, pwd);
                renderDashboard();
            } catch(e) {
                msgDiv.innerText = e.message;
            }
        };
        
        document.getElementById('doRegisterBtn').onclick = async () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pwd = document.getElementById('regPass').value.trim();
            const msgDiv = document.getElementById('regMsg');
            if (!name || !email || pwd.length < 6) {
                msgDiv.innerText = 'Заполните все поля, пароль ≥6';
                return;
            }
            try {
                await registerUser(email, pwd, name);
                msgDiv.innerText = 'Регистрация успешна! Теперь войдите.';
                switchTab('login');
                document.getElementById('loginEmail').value = email;
            } catch(e) {
                msgDiv.innerText = e.message;
            }
        };
    }

    async function renderDashboard() {
        document.getElementById('root').innerHTML = `
            <div>
                <div class="dash-header">
                    <div class="logo"><span>АИС</span><span>Портал в будущее</span></div>
                    <div class="logout-glass" id="logoutBtn">Выйти</div>
                </div>
                <div class="main-grid">
                    <div class="sidebar-new">
                        <div class="sidebar-item" data-section="account">👤 Профиль</div>
                        <div class="sidebar-item" data-section="security">🔒 Безопасность</div>
                        <div class="sidebar-item" data-section="myschool">🏫 Школа</div>
                        <div class="sidebar-item" data-section="docs">📁 Документы</div>
                        <div class="sidebar-item" data-section="vacancies">💼 Вакансии</div>
                        <div class="sidebar-item" data-section="notifications">🔔 Уведомления</div>
                        <div class="sidebar-item" data-section="rating">⭐ Рейтинг</div>
                        <div class="sidebar-item" data-section="labour">📘 Трудовая книжка</div>
                    </div>
                    <div class="content-new">
                        <div id="section-account" class="dynamic-section"></div>
                        <div id="section-security" class="dynamic-section hidden-section"></div>
                        <div id="section-myschool" class="dynamic-section hidden-section"></div>
                        <div id="section-docs" class="dynamic-section hidden-section"></div>
                        <div id="section-vacancies" class="dynamic-section hidden-section"></div>
                        <div id="section-notifications" class="dynamic-section hidden-section"></div>
                        <div id="section-rating" class="dynamic-section hidden-section"></div>
                        <div id="section-labour" class="dynamic-section hidden-section"></div>
                    </div>
                </div>
            </div>
        `;

        // Профиль
        document.getElementById('section-account').innerHTML = `
            <div class="section-card"><h2>${currentUser.fullName}</h2><p>${currentUser.email}</p></div>
            <div class="info-grid-new">
                <div class="section-card">🏫 ЧОУ «Гимназия №3»</div>
                <div class="section-card">📍 Курская область</div>
            </div>
            <div class="service-block-new">
                <div class="service-tile" id="servSpravka">📋 Справка</div>
                <div class="service-tile" id="servJob">💼 Заявление</div>
            </div>
            <button id="deleteAccountBtn" style="background:#B91C1C; width:100%; margin-top:20px;">🗑️ Удалить аккаунт</button>
        `;
        document.getElementById('servSpravka')?.onclick = () => showToast('Справка сформирована');
        document.getElementById('servJob')?.onclick = () => showToast('Заявка отправлена');
        document.getElementById('deleteAccountBtn')?.onclick = async () => {
            if (confirm('Удалить аккаунт навсегда?')) {
                await deleteAccount(currentUser.id);
                renderAuth();
            }
        };

        // Безопасность
        document.getElementById('section-security').innerHTML = `<div class="section-card"><button id="changePwdBtn">Сменить пароль</button></div>`;
        document.getElementById('changePwdBtn')?.onclick = () => {
            const oldP = prompt('Старый пароль');
            const newP = prompt('Новый пароль');
            if (oldP && newP) changePassword(currentUser.id, oldP, newP).then(() => showToast('Пароль изменён')).catch(e => alert(e.message));
        };

        // Школа
        document.getElementById('section-myschool').innerHTML = `<div class="section-card">ЧОУ «Гимназия №3»<br><button id="journalBtn">ЭлЖур</button></div>`;
        document.getElementById('journalBtn')?.onclick = () => showToast('Демо-доступ');

        // Документы
        const renderDocs = () => {
            const container = document.getElementById('docsList');
            if (container) {
                container.innerHTML = (currentUser.documents || []).map(d => `<div class="doc-item">📄 ${d.name} <button class="delDoc btn-sm" data-id="${d.id}">Удалить</button></div>`).join('');
                document.querySelectorAll('.delDoc').forEach(btn => btn.onclick = async () => { await deleteDocument(Number(btn.dataset.id)); renderDashboard(); });
            }
        };
        document.getElementById('section-docs').innerHTML = `<div class="section-card"><input type="file" id="uploadFile"><button id="uploadBtn">Загрузить</button><div id="docsList"></div></div>`;
        document.getElementById('uploadBtn')?.onclick = async () => {
            const file = document.getElementById('uploadFile').files[0];
            if (file) { await uploadDocument(file); renderDashboard(); showToast(`✅ ${file.name} сохранён`); }
        };
        renderDocs();

        // Вакансии
        document.getElementById('section-vacancies').innerHTML = `<div class="section-card"><div>Гимназия №4 — учитель <button class="respBtn btn-sm">Отклик</button></div><div>СОШ №33 — учитель <button class="respBtn btn-sm">Отклик</button></div></div>`;
        document.querySelectorAll('.respBtn').forEach(btn => btn.onclick = () => showToast('Отклик отправлен'));

        document.getElementById('section-notifications').innerHTML = `<div class="section-card">🔔 Заявление одобрено</div>`;
        document.getElementById('section-rating').innerHTML = `<div class="section-card">⭐ Рейтинг: 187 баллов</div>`;
        document.getElementById('section-labour').innerHTML = `<div class="section-card">📘 Трудовая книжка: Гимназия №3</div>`;

        // Навигация
        const sections = ['account', 'security', 'myschool', 'docs', 'vacancies', 'notifications', 'rating', 'labour'];
        const sideItems = document.querySelectorAll('.sidebar-item');
        const divs = document.querySelectorAll('.dynamic-section');
        const showSection = (id) => {
            divs.forEach(d => d.classList.add('hidden-section'));
            document.getElementById(`section-${id}`).classList.remove('hidden-section');
            sideItems.forEach(it => it.classList.remove('active'));
            document.querySelector(`.sidebar-item[data-section="${id}"]`).classList.add('active');
        };
        sideItems.forEach(it => it.onclick = () => showSection(it.dataset.section));
        showSection('account');
        document.getElementById('logoutBtn').onclick = () => { currentUser = null; sessionStorage.removeItem('portal_user'); renderAuth(); };
    }

    const saved = sessionStorage.getItem('portal_user');
    if (saved) { currentUser = JSON.parse(saved); renderDashboard(); } else { renderAuth(); }
</script>
</body>
</html>
