<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Портал в будущее — Вечное хранение</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui; }
        body { background: radial-gradient(circle at 10% 20%, #0A0F2A, #030617); color: #EFF3FF; }
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .glass-card { background: rgba(18, 25, 55, 0.7); backdrop-filter: blur(12px); border-radius: 48px; padding: 2rem; max-width: 500px; width: 100%; border: 1px solid rgba(90,150,255,0.3); }
        .auth-logo { font-size: 1.8rem; font-weight: 700; margin-bottom: 2rem; display: flex; gap: 10px; }
        .auth-logo span:first-child { background: #3B82F6; padding: 6px 18px; border-radius: 60px; color: white; }
        .tabs { display: flex; gap: 24px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 28px; }
        .tab-btn { background: none; border: none; font-size: 1.2rem; font-weight: 600; color: #B9C7FF; padding: 8px 0; cursor: pointer; }
        .tab-btn.active { color: #3B82F6; border-bottom: 2px solid #3B82F6; }
        .form { display: none; flex-direction: column; gap: 18px; }
        .form.active-form { display: flex; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.8rem; color: #B9D0FF; }
        .input-group input { background: rgba(0,0,0,0.4); border: 1px solid #2D3A6E; border-radius: 28px; padding: 12px 18px; color: white; }
        button { background: #3B82F6; border: none; border-radius: 40px; padding: 12px; font-weight: 600; color: white; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2563EB; }
        .message { margin-top: 8px; padding: 10px; border-radius: 28px; text-align: center; font-size: 0.8rem; }
        .error-message { background: rgba(185,28,28,0.6); }
        .success-message { background: rgba(59,130,246,0.6); }
        .dash-header { background: rgba(8,12,30,0.85); backdrop-filter: blur(12px); padding: 12px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 1.4rem; font-weight: 700; display: flex; gap: 8px; }
        .logo span:first-child { background: #3B82F6; padding: 4px 14px; border-radius: 50px; color: white; }
        .logout-glass { background: rgba(255,255,255,0.08); padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .main-grid { max-width: 1400px; margin: 32px auto; padding: 0 24px; display: flex; gap: 28px; flex-wrap: wrap; }
        .sidebar-new { flex: 0 0 260px; background: rgba(15,22,48,0.7); backdrop-filter: blur(8px); border-radius: 36px; padding: 20px 12px; border: 1px solid #28315A; }
        .sidebar-item { padding: 12px 18px; margin: 6px 0; border-radius: 28px; cursor: pointer; transition: 0.2s; }
        .sidebar-item:hover { background: #1E2A5C; }
        .sidebar-item.active { background: #3B82F6; color: white; }
        .content-new { flex: 1; background: rgba(10,16,38,0.6); backdrop-filter: blur(8px); border-radius: 36px; padding: 28px 32px; border: 1px solid #28315A; }
        .section-card { background: rgba(0,0,0,0.3); border-radius: 28px; padding: 20px; margin-bottom: 24px; }
        .info-grid-new { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 20px; margin: 28px 0; }
        .service-block-new { display: flex; gap: 20px; flex-wrap: wrap; margin: 30px 0; }
        .service-tile { background: #111B44; border-radius: 28px; padding: 20px; flex: 1; cursor: pointer; border: 1px solid #2D3F78; transition: 0.2s; }
        .service-tile:hover { background: #1E2F66; transform: translateY(-2px); }
        .hidden-section { display: none; }
        .doc-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #28315A; }
        .btn-sm { background: #2563EB; padding: 6px 16px; border-radius: 30px; font-size: 0.75rem; border: none; color: white; cursor: pointer; }
        .btn-sm:hover { background: #3B82F6; }
        .delete-account-btn { background: rgba(185, 28, 28, 0.8); margin-top: 20px; width: 100%; }
        .delete-account-btn:hover { background: #B91C1C; }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // === НАСТРОЙКИ GITHUB (ТОКЕН ОБНОВЛЁН) ===
    const GITHUB_TOKEN = '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';
    const REPO_OWNER = 'sergeyRU38';
    const REPO_NAME = 'AIS-Portal-v-budushcee';
    const DB_FILE = 'database.json';

    let currentUser = null;

    // Правильное кодирование для русских букв
    function toBase64(str) {
        const bytes = new TextEncoder().encode(str);
        let binString = '';
        bytes.forEach(byte => binString += String.fromCodePoint(byte));
        return btoa(binString);
    }

    function fromBase64(base64) {
        const binString = atob(base64);
        const bytes = new Uint8Array(binString.length);
        for (let i = 0; i < binString.length; i++) bytes[i] = binString.charCodeAt(i);
        return new TextDecoder().decode(bytes);
    }

    async function loadDatabase() {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DB_FILE}`;
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            if (res.status === 404) return { users: [] };
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const content = fromBase64(data.content);
            return JSON.parse(content);
        } catch(e) {
            console.error('Ошибка загрузки', e);
            return { users: [] };
        }
    }

    async function saveDatabase(db) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DB_FILE}`;
        const content = toBase64(JSON.stringify(db, null, 2));
        let sha = null;
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            if (res.ok) {
                const data = await res.json();
                sha = data.sha;
            }
        } catch(e) {}
        const body = { message: 'Update database', content, branch: 'main' };
        if (sha) body.sha = sha;
        const response = await fetch(url, { 
            method: 'PUT', 
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' }, 
            body: JSON.stringify(body) 
        });
        if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
        return await response.json();
    }

    async function registerUser(email, password, fullName) {
        const db = await loadDatabase();
        if (db.users.find(u => u.email === email)) throw new Error('Пользователь уже существует');
        const newUser = { id: Date.now(), email, password, fullName, documents: [] };
        db.users.push(newUser);
        await saveDatabase(db);
        return true;
    }

    async function loginUser(email, password) {
        const db = await loadDatabase();
        const user = db.users.find(u => u.email === email && u.password === password);
        if (!user) throw new Error('Неверный email или пароль');
        currentUser = user;
        sessionStorage.setItem('portal_user', JSON.stringify(currentUser));
        return true;
    }

    async function updateUserDocs(userId, newDocs) {
        const db = await loadDatabase();
        const idx = db.users.findIndex(u => u.id === userId);
        if (idx !== -1) db.users[idx].documents = newDocs;
        await saveDatabase(db);
        if (currentUser && currentUser.id === userId) {
            currentUser.documents = newDocs;
            sessionStorage.setItem('portal_user', JSON.stringify(currentUser));
        }
    }

    async function deleteAccount(userId) {
        const db = await loadDatabase();
        db.users = db.users.filter(u => u.id !== userId);
        await saveDatabase(db);
        currentUser = null;
        sessionStorage.removeItem('portal_user');
    }

    async function changePassword(userId, oldPwd, newPwd) {
        const db = await loadDatabase();
        const user = db.users.find(u => u.id === userId);
        if (!user || user.password !== oldPwd) throw new Error('Старый пароль неверен');
        user.password = newPwd;
        await saveDatabase(db);
        if (currentUser && currentUser.id === userId) {
            currentUser.password = newPwd;
            sessionStorage.setItem('portal_user', JSON.stringify(currentUser));
        }
    }

    async function uploadDocument(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const docs = currentUser.documents || [];
                const newDoc = { id: Date.now(), name: file.name, type: file.type, data: e.target.result };
                docs.push(newDoc);
                await updateUserDocs(currentUser.id, docs);
                resolve();
            };
            reader.readAsDataURL(file);
        });
    }

    async function deleteDocument(docId) {
        const docs = currentUser.documents.filter(d => d.id !== docId);
        await updateUserDocs(currentUser.id, docs);
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '24px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = isError ? '#B91C1C' : '#3B82F6';
        toast.style.color = 'white';
        toast.style.padding = '10px 24px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '9999';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showChangePasswordModal() {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:2000';
        modal.innerHTML = `
            <div style="background:#0F1736; border-radius:36px; padding:28px; width:90%; max-width:400px;">
                <h3 style="margin-bottom:20px;">Смена пароля</h3>
                <div class="input-group"><label>Старый пароль</label><input type="password" id="modalOld" style="color:white;"></div>
                <div class="input-group"><label>Новый пароль</label><input type="password" id="modalNew" style="color:white;"></div>
                <button id="modalConfirm" style="margin-top:16px;">Сохранить</button>
                <button id="modalClose" style="background:#2D3A6E; margin-top:8px;">Отмена</button>
                <div id="modalMsg" class="message"></div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#modalConfirm').onclick = async () => {
            const oldP = modal.querySelector('#modalOld').value;
            const newP = modal.querySelector('#modalNew').value;
            try {
                await changePassword(currentUser.id, oldP, newP);
                modal.querySelector('#modalMsg').innerText = 'Пароль изменён!';
                setTimeout(() => modal.remove(), 1000);
                showToast('Пароль обновлён');
            } catch(e) {
                modal.querySelector('#modalMsg').innerText = e.message;
            }
        };
        modal.querySelector('#modalClose').onclick = () => modal.remove();
    }

    function renderAuth() {
        document.getElementById('root').innerHTML = `
            <div class="auth-wrapper">
                <div class="glass-card">
                    <div class="auth-logo"><span>АИС</span><span>Портал в будущее</span></div>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="login">Вход</button>
                        <button class="tab-btn" data-tab="register">Регистрация</button>
                    </div>
                    <div id="loginForm" class="form active-form">
                        <div class="input-group"><label>Email</label><input id="loginEmail" placeholder="teacher@school.ru"></div>
                        <div class="input-group"><label>Пароль</label><input id="loginPass" type="password"></div>
                        <button id="doLoginBtn">Войти</button>
                        <div id="loginMsg" class="message"></div>
                    </div>
                    <div id="registerForm" class="form">
                        <div class="input-group"><label>Полное имя</label><input id="regName" placeholder="Иванова Анна Петровна"></div>
                        <div class="input-group"><label>Email</label><input id="regEmail" placeholder="teacher@portal.ru"></div>
                        <div class="input-group"><label>Пароль (≥6)</label><input id="regPass" type="password"></div>
                        <button id="doRegisterBtn">Зарегистрироваться</button>
                        <div id="regMsg" class="message"></div>
                    </div>
                </div>
            </div>
        `;

        const switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('loginForm').classList.toggle('active-form', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active-form', tab === 'register');
        };
        document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => switchTab(btn.dataset.tab));
        
        document.getElementById('doLoginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPass').value.trim();
            const msgDiv = document.getElementById('loginMsg');
            try {
                await loginUser(email, pwd);
                renderDashboard();
            } catch(e) {
                msgDiv.innerText = e.message;
                msgDiv.className = 'message error-message';
            }
        };
        
        document.getElementById('doRegisterBtn').onclick = async () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pwd = document.getElementById('regPass').value.trim();
            const msgDiv = document.getElementById('regMsg');
            if (!name || !email || pwd.length < 6) {
                msgDiv.innerText = 'Заполните все поля, пароль ≥6';
                msgDiv.className = 'message error-message';
                return;
            }
            try {
                await registerUser(email, pwd, name);
                msgDiv.innerText = 'Регистрация успешна! Теперь войдите.';
                msgDiv.className = 'message success-message';
                switchTab('login');
                document.getElementById('loginEmail').value = email;
            } catch(e) {
                msgDiv.innerText = e.message;
                msgDiv.className = 'message error-message';
            }
        };
    }

    async function renderDashboard() {
        document.getElementById('root').innerHTML = `
            <div>
                <div class="dash-header">
                    <div class="logo"><span>АИС</span><span>Портал в будущее</span></div>
                    <div class="logout-glass" id="logoutBtn">Выйти</div>
                </div>
                <div class="main-grid">
                    <div class="sidebar-new">
                        <div class="sidebar-item" data-section="account">👤 Профиль</div>
                        <div class="sidebar-item" data-section="security">🔒 Безопасность</div>
                        <div class="sidebar-item" data-section="myschool">🏫 Школа</div>
                        <div class="sidebar-item" data-section="docs">📁 Мои документы</div>
                        <div class="sidebar-item" data-section="vacancies">💼 Вакансии</div>
                        <div class="sidebar-item" data-section="notifications">🔔 Уведомления</div>
                        <div class="sidebar-item" data-section="rating">⭐ Рейтинг</div>
                        <div class="sidebar-item" data-section="labour">📘 Трудовая книжка</div>
                    </div>
                    <div class="content-new">
                        <div id="section-account" class="dynamic-section"></div>
                        <div id="section-security" class="dynamic-section hidden-section"></div>
                        <div id="section-myschool" class="dynamic-section hidden-section"></div>
                        <div id="section-docs" class="dynamic-section hidden-section"></div>
                        <div id="section-vacancies" class="dynamic-section hidden-section"></div>
                        <div id="section-notifications" class="dynamic-section hidden-section"></div>
                        <div id="section-rating" class="dynamic-section hidden-section"></div>
                        <div id="section-labour" class="dynamic-section hidden-section"></div>
                    </div>
                </div>
            </div>
        `;

        // Профиль
        document.getElementById('section-account').innerHTML = `
            <div class="section-card"><h2>${escapeHtml(currentUser.fullName)}</h2><p>${escapeHtml(currentUser.email)}</p></div>
            <div class="info-grid-new">
                <div class="section-card">🏫 ЧОУ «Гимназия №3»</div>
                <div class="section-card">📍 Курская область</div>
                <div class="section-card">⭐ Стаж: 2 года</div>
            </div>
            <div class="service-block-new">
                <div class="service-tile" id="servSpravka">📋 Справка о портфолио</div>
                <div class="service-tile" id="servJob">💼 Заявление на работу</div>
                <div class="service-tile" id="servHelp">📞 Помощь</div>
            </div>
            <button id="deleteAccountBtn" class="delete-account-btn">🗑️ Удалить аккаунт навсегда</button>
        `;
        document.getElementById('servSpravka')?.addEventListener('click', () => showToast('Справка сформирована (PDF)'));
        document.getElementById('servJob')?.addEventListener('click', () => showToast('Заявка отправлена в кадровый отдел'));
        document.getElementById('servHelp')?.addEventListener('click', () => showToast('Чат поддержки: @portal_help'));
        document.getElementById('deleteAccountBtn')?.addEventListener('click', async () => {
            if (confirm('Удалить аккаунт навсегда? Все документы будут потеряны.')) {
                await deleteAccount(currentUser.id);
                renderAuth();
            }
        });

        // Безопасность
        document.getElementById('section-security').innerHTML = `<div class="section-card"><h3>Смена пароля</h3><button id="changePwdBtn">Изменить пароль</button></div>`;
        document.getElementById('changePwdBtn')?.addEventListener('click', showChangePasswordModal);

        // Школа
        document.getElementById('section-myschool').innerHTML = `<div class="section-card"><strong>ЧОУ «Гимназия №3»</strong><br>Учитель русского языка и литературы<br>Классное руководство: 7 «А»<br><button id="journalBtn" style="margin-top:16px;">Перейти к ЭлЖур</button></div>`;
        document.getElementById('journalBtn')?.addEventListener('click', () => showToast('Демо-доступ к электронному журналу'));

        // Документы
        const renderDocs = () => {
            const container = document.getElementById('docsList');
            if (container) {
                const docs = currentUser.documents || [];
                container.innerHTML = docs.map(d => `<div class="doc-item">📄 ${escapeHtml(d.name)} <button class="delete-doc-btn btn-sm" data-id="${d.id}">Удалить</button></div>`).join('');
                document.querySelectorAll('.delete-doc-btn').forEach(btn => btn.onclick = async () => {
                    await deleteDocument(Number(btn.dataset.id));
                    await renderDashboard();
                });
            }
        };
        document.getElementById('section-docs').innerHTML = `<div class="section-card"><h3>Мои документы</h3><input type="file" id="uploadFile" style="margin: 16px 0; color:white;"><button id="uploadBtn">Загрузить документ</button><div id="docsList" style="margin-top: 20px;"></div></div>`;
        document.getElementById('uploadBtn')?.addEventListener('click', async () => {
            const file = document.getElementById('uploadFile').files[0];
            if (file) {
                await uploadDocument(file);
                await renderDashboard();
                showToast(`✅ ${file.name} сохранён навсегда`);
            } else {
                showToast('Выберите файл', true);
            }
        });
        renderDocs();

        // Вакансии
        document.getElementById('section-vacancies').innerHTML = `<div class="section-card"><h3>Вакансии</h3>
            <div style="background:#0E163B; border-radius:28px; padding:16px; margin:8px 0;">📌 Гимназия №4 — учитель технологии <button class="respondVacBtn btn-sm" data-vac="Гимназия №4">Откликнуться</button></div>
            <div style="background:#0E163B; border-radius:28px; padding:16px; margin:8px 0;">📌 СОШ №33 — учитель ИЗО <button class="respondVacBtn btn-sm" data-vac="СОШ №33">Откликнуться</button></div>
            <div style="background:#0E163B; border-radius:28px; padding:16px; margin:8px 0;">📌 Лицей №1 — учитель математики <button class="respondVacBtn btn-sm" data-vac="Лицей №1">Откликнуться</button></div>
        </div>`;
        document.querySelectorAll('.respondVacBtn').forEach(btn => btn.onclick = () => showToast(`✅ Отклик на вакансию "${btn.dataset.vac}" отправлен`));

        // Уведомления
        document.getElementById('section-notifications').innerHTML = `<div class="section-card">
            🔔 <strong>17.05.2026</strong> — Заявление на трудоустройство №641 одобрено<br>
            📄 <strong>17.05.2026</strong> — Услуга «Выписка данных» оказана<br>
            📩 <strong>15.05.2026</strong> — Приглашение на вебинар «Цифровые инструменты»
        </div>`;

        // Рейтинг
        document.getElementById('section-rating').innerHTML = `<div class="section-card">
            <h3>⭐ Мой рейтинг: 187 баллов</h3>
            <p>Уровень: «Эксперт»</p>
            <p>🏆 Топ-10 педагогов региона</p>
            <button id="ratingDetails" style="margin-top:12px;">Подробнее</button>
        </div>`;
        document.getElementById('ratingDetails')?.addEventListener('click', () => showToast('Рейтинг формируется из портфолио, отзывов и КПК'));

        // Трудовая книжка
        document.getElementById('section-labour').innerHTML = `<div class="section-card">
            <h3>📘 Цифровая трудовая книжка</h3>
            <p><strong>17.05.2026 — н.в.</strong> — ЧОУ «Гимназия №3», учитель</p>
            <p><strong>01.09.2024 — 16.05.2026</strong> — МБОУ СОШ №15, учитель</p>
            <button id="downloadLabourBtn" style="margin-top:12px;">Скачать выписку</button>
        </div>`;
        document.getElementById('downloadLabourBtn')?.addEventListener('click', () => showToast('Выписка из трудовой книжки сформирована'));

        // Навигация
        const sections = ['account', 'security', 'myschool', 'docs', 'vacancies', 'notifications', 'rating', 'labour'];
        const sideItems = document.querySelectorAll('.sidebar-item');
        const divs = document.querySelectorAll('.dynamic-section');
        const showSection = (id) => {
            divs.forEach(d => d.classList.add('hidden-section'));
            document.getElementById(`section-${id}`)?.classList.remove('hidden-section');
            sideItems.forEach(it => {
                it.classList.remove('active');
                if (it.dataset.section === id) it.classList.add('active');
            });
        };
        sideItems.forEach(it => {
            if (it.dataset.section && sections.includes(it.dataset.section)) {
                it.addEventListener('click', () => showSection(it.dataset.section));
            }
        });
        showSection('account');

        document.getElementById('logoutBtn').onclick = () => {
            currentUser = null;
            sessionStorage.removeItem('portal_user');
            renderAuth();
        };
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    const saved = sessionStorage.getItem('portal_user');
    if (saved) {
        currentUser = JSON.parse(saved);
        renderDashboard();
    } else {
        renderAuth();
    }
</script>
</body>
</html>
